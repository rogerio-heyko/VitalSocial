version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teleios_postgres
    environment:
      POSTGRES_USER: teleios_user
      POSTGRES_PASSWORD: teleios_password
      POSTGRES_DB: teleios_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teleios_net

  backend:
    build: ./backend
    container_name: teleios_backend
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://teleios_user:teleios_password@postgres:5432/teleios_db
      PORT: 3000
      JWT_SECRET: changeme_in_production
    depends_on:
      - postgres
    command: npm run dev

  frontend:
    image: node:20
    container_name: teleios_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=10.0.0.198 # User's LAN IP
    command: npx expo start --lan


    networks:
      - teleios_net

volumes:
  postgres_data:

networks:
  teleios_net:
