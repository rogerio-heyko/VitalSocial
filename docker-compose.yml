version: '3.8'

services:
  vitalsocial-postgres:
    image: postgres:15-alpine
    container_name: vital_social_postgres
    environment:
      POSTGRES_USER: vital_user
      POSTGRES_PASSWORD: vital_password
      POSTGRES_DB: vital_db
    ports:
      - "5433:5432"
    volumes:
      - vitalsocial_postgres_data:/var/lib/postgresql/data

  vitalsocial-backend:
    build: ./backend
    container_name: vital_social_backend
    ports:
      - "3002:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://vital_user:vital_password@vitalsocial-postgres:5432/vital_db
      PORT: 3000
      JWT_SECRET: changeme_in_production
    depends_on:
      - vitalsocial-postgres
    command: npm run dev

  vitalsocial-frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=10.0.0.198
    stdin_open: true
    tty: true
    command: npx expo start --lan

volumes:
  vitalsocial_postgres_data:
